{% extends 'base.html' %}

{% block conteudo %}

<h2 class="mb-4">
Cadastrar Pagamento
</h2>

<form action="/salvar_pagamento" method="post">

<div class="mb-3">

<label class="form-label">
Nome do Pagador
</label>

<input type="text"
name="nome_pagador"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Valor (R$)
</label>

<input type="number"
step="0.01"
min="0"
name="valor"
class="form-control"
placeholder="0,00"
required>

</div>

<div class="mb-3">

<label class="form-label">
Data do Pagamento
</label>

<input type="date"
name="data_pagamento"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Forma de Pagamento
</label>

<select name="forma_pagamento"
class="form-control"
required>

<option value="">
Selecione
</option>

<option>Dinheiro</option>

<option>Crédito</option>

<option>Débito</option>

<option>PIX</option>

<option>Boleto</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">
Status do Pagamento
</label>

<select name="status_pagamento"
class="form-control"
required>

<option>Pendente</option>

<option>Pago</option>

<option>Atrasado</option>

</select>

</div>

<button type="submit"
class="btn btn-primary">

Salvar Pagamento

</button>

<a href="/"
class="btn btn-secondary">

Voltar

</a>

</form>

{% endblock %}
