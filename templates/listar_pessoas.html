{% extends "base.html" %}

{% block conteudo %}

<h2 class="mb-3">Pessoas Cadastradas</h2>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>CPF</th>
<th>Ações</th>
</tr>

</thead>

<tbody>

{% for pessoa in pessoas %}

<tr>

<td>{{ pessoa[0] }}</td>
<td>{{ pessoa[1] }}</td>
<td>{{ pessoa[2] }}</td>
<td>{{ pessoa[3] }}</td>
<td>{{ pessoa[4] }}</td>

<td>

<a href="/editar_pessoa/{{ pessoa[0] }}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="/deletar_pessoa/{{ pessoa[0] }}" class="btn btn-danger btn-sm">
Excluir
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
