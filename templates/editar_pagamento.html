{% extends 'base.html' %}

{% block conteudo %}

<h2 class="mb-4">
Editar Pagamento
</h2>

<form action="/atualizar_pagamento" method="post">

<input type="hidden"
name="id"
value="{{ pagamento[0] }}">

<div class="mb-3">

<label class="form-label">
Nome do Pagador
</label>

<input type="text"
name="nome_pagador"
value="{{ pagamento[1] }}"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Valor (R$)
</label>

<input type="number"
step="0.01"
min="0"
name="valor"
value="{{ pagamento[2] }}"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Data do Pagamento
</label>

<input type="date"
name="data_pagamento"
value="{{ pagamento[3] }}"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Forma de Pagamento
</label>

<select name="forma_pagamento"
class="form-control"
required>

<option {% if pagamento[4] == "Dinheiro" %}selected{% endif %}>
Dinheiro
</option>

<option {% if pagamento[4] == "Crédito" %}selected{% endif %}>
Crédito
</option>

<option {% if pagamento[4] == "Débito" %}selected{% endif %}>
Débito
</option>

<option {% if pagamento[4] == "PIX" %}selected{% endif %}>
PIX
</option>

<option {% if pagamento[4] == "Boleto" %}selected{% endif %}>
Boleto
</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">
Status do Pagamento
</label>

<select name="status_pagamento"
class="form-control"
required>

<option {% if pagamento[5] == "Pendente" %}selected{% endif %}>
Pendente
</option>

<option {% if pagamento[5] == "Pago" %}selected{% endif %}>
Pago
</option>

<option {% if pagamento[5] == "Atrasado" %}selected{% endif %}>
Atrasado
</option>

</select>

</div>

<button type="submit"
class="btn btn-success">

Atualizar Pagamento

</button>

<a href="/pagamentos"
class="btn btn-secondary">

Voltar

</a>

</form>

{% endblock %}
